ShortDescription: A local-first Windows Pomodoro timer with camera LED break alerts.
Description: |-
  Lumen Pomodoro is a Windows desktop focus timer for deep work.
  When a focus session ends it can turn on the laptop camera so the hardware LED lights up as a hard-to-miss break signal.
  No photos, no video recording, no cloud upload. Includes tasks, stats, focus guard, and optional fullscreen breaks.
