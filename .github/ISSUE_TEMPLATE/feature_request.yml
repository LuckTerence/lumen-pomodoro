name: 功能建议
description: 建议一个新功能
labels: ['enhancement']
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你希望增加什么功能
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 使用场景
      description: 为什么需要这个功能，解决什么问题
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 目前你是怎么解决这个问题的
