name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore LumenPomodoro.sln

      - name: Build
        run: dotnet build LumenPomodoro.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test LumenPomodoro.Tests --configuration Release --no-build --verbosity normal
