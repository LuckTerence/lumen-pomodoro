name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # 与 LumenPomodoro.csproj 的 net8.0-windows 对齐
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore LumenPomodoro.sln

      - name: Build
        run: dotnet build LumenPomodoro.sln --configuration Release --no-restore

      # 跨平台 EOL/空白门禁易被 runner 的 autocrlf 干扰；不阻断测试与覆盖率
      - name: Format check (advisory)
        continue-on-error: true
        run: |
          dotnet format whitespace LumenPomodoro.sln --verify-no-changes --verbosity minimal \
            && echo "Format OK" \
            || echo "::warning::whitespace format 未通过（不阻断 CI，见 .editorconfig / .gitattributes）"

      # 先跑无 coverlet 的快速测试（coverlet + WPF Dispatcher 在 runner 上易挂死）
      - name: Test
        timeout-minutes: 8
        run: >
          dotnet test LumenPomodoro.Tests
          --configuration Release
          --no-build
          --verbosity normal
          --blame-hang-timeout 60s

      - name: Test with coverage (advisory)
        continue-on-error: true
        timeout-minutes: 8
        run: >
          dotnet test LumenPomodoro.Tests
          --configuration Release
          --no-build
          --verbosity minimal
          --blame-hang-timeout 60s
          --settings LumenPomodoro.Tests/coverlet.runsettings
          --collect:"XPlat Code Coverage"

      - name: Coverage summary (advisory)
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $coverageFile = Get-ChildItem -Path LumenPomodoro.Tests/TestResults -Recurse -Filter coverage.cobertura.xml -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $coverageFile) {
            Write-Host "No coverage file (advisory step skipped)."
            return
          }
          [xml]$xml = Get-Content $coverageFile.FullName
          $linePct = [math]::Round([double]$xml.coverage.'line-rate' * 100, 1)
          Write-Host "Line coverage: $linePct%"
          "### Coverage: $linePct% line" | Out-File -Append $env:GITHUB_STEP_SUMMARY
