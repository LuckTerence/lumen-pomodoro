name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: >
          dotnet publish LumenPomodoro\LumenPomodoro.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -p:DebugSymbols=false
          --output publish

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/LumenPomodoro.exe
          generate_release_notes: true
          body: |
            ## Lumen Pomodoro ${{ github.ref_name }}

            - Windows x64 自包含单文件，无需安装 .NET 运行时
            - 下载 `LumenPomodoro.exe` 双击即可使用
            - 摄像头数据仅在本地调用，不上传
