name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Windows package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Write-Host '=== Publish WPF app (framework-dependent) ==='
          dotnet publish LumenPomodoro/LumenPomodoro.csproj `
            -c Release -r win-x64 --self-contained false `
            -p:PublishSingleFile=true -p:DebugType=none -p:DebugSymbols=false `
            -o publish/app
          if ($LASTEXITCODE -ne 0) { throw "WPF publish failed: $LASTEXITCODE" }

          Write-Host '=== Publish Launcher (self-contained, non-AOT) ==='
          # 覆盖 csproj 中 PublishAot=true，避免 runner 无原生 AOT 工具链
          dotnet publish Launcher/Launcher.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishAot=false `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none -p:DebugSymbols=false `
            -o publish/launcher-out
          if ($LASTEXITCODE -ne 0) { throw "Launcher publish failed: $LASTEXITCODE" }

          # 启动器程序集名为 LumenPomodoro.exe
          $launcher = Get-ChildItem publish/launcher-out -Filter LumenPomodoro.exe -Recurse | Select-Object -First 1
          if (-not $launcher) {
            Get-ChildItem publish/launcher-out -Recurse | Select-Object FullName
            throw 'Launcher LumenPomodoro.exe not found'
          }
          Copy-Item $launcher.FullName publish/LumenPomodoro.exe -Force

          $app = 'publish/app/LumenPomodoro.exe'
          if (-not (Test-Path $app)) { throw "App missing: $app" }

          Write-Host '=== Zip ==='
          if (Test-Path LumenPomodoro.zip) { Remove-Item LumenPomodoro.zip -Force }
          Compress-Archive -Path publish/LumenPomodoro.exe,publish/app -DestinationPath LumenPomodoro.zip -Force
          $hash = (Get-FileHash .\LumenPomodoro.zip -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path winget-sha256.txt -Value $hash -NoNewline
          Write-Host "SHA256=$hash"
          Get-Item LumenPomodoro.zip | Format-List Name,Length

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            LumenPomodoro.zip
            winget-sha256.txt

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          uname -m
          swift --version
          xcodebuild -version || true

      - name: Build DMG via SPM
        run: |
          set -euo pipefail
          chmod +x LumenPomodoroMac/*.sh
          export VERSION="${GITHUB_REF_NAME#v}"
          cd LumenPomodoroMac
          swift build -c release
          find .build -type f -name LumenPomodoroMac | head -20
          ./package-dmg.sh
          ls -la dist/
          test -n "$(ls dist/*.dmg)"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: LumenPomodoroMac/dist/*.dmg
          if-no-files-found: error

  release:
    needs: [windows, macos]
    if: always() && (needs.windows.result == 'success' || needs.macos.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f -print || true
          if [ -f artifacts/windows-package/LumenPomodoro.zip ]; then
            cp artifacts/windows-package/LumenPomodoro.zip dist/
            cp artifacts/windows-package/winget-sha256.txt dist/ || true
          fi
          if ls artifacts/macos-package/*.dmg >/dev/null 2>&1; then
            cp artifacts/macos-package/*.dmg dist/
          fi
          ls -la dist
          test -n "$(ls -A dist)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body_path: docs/GITHUB_RELEASE_v0.4.1.md
          fail_on_unmatched_files: false
