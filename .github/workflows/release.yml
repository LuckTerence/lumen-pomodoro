name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Windows package
        shell: pwsh
        run: |
          dotnet publish LumenPomodoro\LumenPomodoro.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            --output publish\app

          dotnet publish Launcher\Launcher.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishAot=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            --output publish

          Compress-Archive -Path publish\LumenPomodoro.exe,publish\app -DestinationPath LumenPomodoro.zip -Force
          $hash = (Get-FileHash .\LumenPomodoro.zip -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path winget-sha256.txt -Value $hash
          Write-Host "SHA256=$hash"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            LumenPomodoro.zip
            winget-sha256.txt

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build DMG
        run: |
          chmod +x LumenPomodoroMac/build-mac.sh LumenPomodoroMac/package-dmg.sh LumenPomodoroMac/generate-xcodeproj.sh
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION
          ./LumenPomodoroMac/package-dmg.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: LumenPomodoroMac/dist/*.dmg

  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p dist
          cp artifacts/windows-package/LumenPomodoro.zip dist/
          cp artifacts/windows-package/winget-sha256.txt dist/ || true
          cp artifacts/macos-package/*.dmg dist/ || true
          ls -la dist
          SHA=$(cat dist/winget-sha256.txt 2>/dev/null || echo "see artifact")
          echo "WINGET_SHA256=$SHA" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body_path: docs/GITHUB_RELEASE_v0.4.0.md
