name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Windows (self-contained single-file)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # CI 可靠路径：自包含 WPF 单文件（无需单独启动器 / AOT）
          # 用户本机仍可用 Publish-LumenPomodoro.cmd 打「小启动器 + FDD」包
          dotnet restore LumenPomodoro/LumenPomodoro.csproj
          dotnet publish LumenPomodoro/LumenPomodoro.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -o publish/win
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-ChildItem publish/win | Format-Table Name,Length
          if (-not (Test-Path publish/win/LumenPomodoro.exe)) { throw 'LumenPomodoro.exe missing' }

          # zip 内直接是 exe（解压即用）
          if (Test-Path LumenPomodoro.zip) { Remove-Item LumenPomodoro.zip -Force }
          Compress-Archive -Path publish/win/* -DestinationPath LumenPomodoro.zip -Force
          $hash = (Get-FileHash .\LumenPomodoro.zip -Algorithm SHA256).Hash.ToLower()
          Set-Content winget-sha256.txt $hash -NoNewline
          Write-Host "SHA256=$hash Size=$((Get-Item LumenPomodoro.zip).Length)"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            LumenPomodoro.zip
            winget-sha256.txt

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          uname -a
          swift --version

      - name: Build DMG
        run: |
          set -euo pipefail
          chmod +x LumenPomodoroMac/*.sh
          export VERSION="${GITHUB_REF_NAME#v}"
          # workflow_dispatch 时无 tag，用 props 版本
          if [[ "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION=$(grep -E '<Version>' Directory.Build.props | sed -E 's/.*<Version>([^<]+)<.*/\1/')
            export VERSION
          fi
          echo "VERSION=$VERSION"
          cd LumenPomodoroMac
          swift package resolve
          swift build -c release --product LumenPomodoroMac
          find .build -type f -name LumenPomodoroMac -print
          ./package-dmg.sh
          ls -la dist/
          test -n "$(ls dist/*.dmg)"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: LumenPomodoroMac/dist/*.dmg
          if-no-files-found: error

  release:
    needs: [windows, macos]
    if: always() && startsWith(github.ref, 'refs/tags/') && (needs.windows.result == 'success' || needs.macos.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare files
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f -print
          cp artifacts/windows-package/LumenPomodoro.zip dist/ 2>/dev/null || true
          cp artifacts/windows-package/winget-sha256.txt dist/ 2>/dev/null || true
          cp artifacts/macos-package/*.dmg dist/ 2>/dev/null || true
          ls -la dist
          test -n "$(ls -A dist)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body_path: docs/GITHUB_RELEASE_v0.4.1.md
          fail_on_unmatched_files: false
