name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Windows package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # 主程序（framework-dependent 单文件）
          dotnet publish LumenPomodoro/LumenPomodoro.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            --output publish/app

          # 启动器：CI 用非 AOT 自包含（避免 runner 缺少原生 AOT 工具链）
          # 本地可用 Publish-LumenPomodoro.cmd 打 AOT 小体积版
          dotnet publish Launcher/Launcher.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishAot=false `
            -p:PublishSingleFile=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output publish

          if (-not (Test-Path publish/LumenPomodoro.exe)) { throw 'Launcher exe missing' }
          if (-not (Test-Path publish/app/LumenPomodoro.exe)) { throw 'App exe missing' }

          Compress-Archive -Path publish/LumenPomodoro.exe,publish/app -DestinationPath LumenPomodoro.zip -Force
          $hash = (Get-FileHash .\LumenPomodoro.zip -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path winget-sha256.txt -Value $hash -NoNewline
          Write-Host "SHA256=$hash"
          Get-Item LumenPomodoro.zip | Format-List Name,Length

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            LumenPomodoro.zip
            winget-sha256.txt

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Build DMG
        run: |
          set -euo pipefail
          chmod +x LumenPomodoroMac/build-mac.sh LumenPomodoroMac/package-dmg.sh LumenPomodoroMac/generate-xcodeproj.sh
          export VERSION="${GITHUB_REF_NAME#v}"
          cd LumenPomodoroMac
          # 强制 SPM release 路径（不依赖 Xcode scheme）
          swift build -c release --product LumenPomodoroMac || swift build -c release
          test -x .build/release/LumenPomodoroMac
          ./package-dmg.sh
          ls -la dist/
          test -n "$(ls dist/*.dmg 2>/dev/null)"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: LumenPomodoroMac/dist/*.dmg
          if-no-files-found: error

  release:
    needs: [windows, macos]
    if: always() && (needs.windows.result == 'success' || needs.macos.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f -print
          if [ -f artifacts/windows-package/LumenPomodoro.zip ]; then
            cp artifacts/windows-package/LumenPomodoro.zip dist/
            cp artifacts/windows-package/winget-sha256.txt dist/ || true
          fi
          if ls artifacts/macos-package/*.dmg >/dev/null 2>&1; then
            cp artifacts/macos-package/*.dmg dist/
          fi
          ls -la dist
          test -n "$(ls -A dist)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body_path: docs/GITHUB_RELEASE_v0.4.1.md
          fail_on_unmatched_files: false
